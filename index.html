<style>
:root {
  --bg: #080A0F;
  --surface: #0E1117;
  --card: #121820;
  --card2: #161E28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --gold: #C9A84C;
  --gold2: #E8C96A;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-glow: rgba(201,168,76,0.08);
  --cream: #EDE8DF;
  --muted: #5A6478;
  --muted2: #8892A4;
  --red: #D94F4F;
  --green: #4CAF7C;
  --blue: #4A7EC9;
  --purple: #8B5CF6;
  --cyan: #22B8C9;
  --text: #D4CBBF;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: 'Syne', sans-serif; overflow-x: hidden; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* LAYOUT */
#root { min-height: 100vh; }
.app-shell { display: flex; min-height: 100vh; }
.sidebar { width: 220px; min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 28px 0 24px; position: sticky; top: 0; flex-shrink: 0; }
.main { flex: 1; overflow: hidden; }
.content { padding: 36px 40px; max-width: 1200px; }

/* LOGO */
.logo { padding: 0 24px 32px; display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 32px; height: 32px; background: var(--gold-dim); border: 1px solid var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.logo-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--cream); letter-spacing: .01em; }
.logo-sub { font-size: 9px; color: var(--muted2); letter-spacing: .15em; text-transform: uppercase; font-family: 'DM Mono', monospace; }

/* NAV */
.nav-section { font-size: 9px; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; padding: 0 24px 8px; font-family: 'DM Mono', monospace; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; cursor: pointer; font-size: 13px; color: var(--muted2); transition: all .15s; border-right: 2px solid transparent; position: relative; }
.nav-item:hover { color: var(--cream); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--gold2); border-right-color: var(--gold); background: var(--gold-glow); }
.nav-item .icon { font-size: 14px; width: 20px; text-align: center; }
.nav-sep { margin: 16px 0; border: none; border-top: 1px solid var(--border); }
.nav-footer { margin-top: auto; padding: 0 24px; }
.api-status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 11px; color: var(--muted2); cursor: pointer; transition: all .2s; }
.api-status:hover { border-color: var(--gold); color: var(--gold2); }
.api-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.api-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); transition: border-color .2s; }
.card:hover { border-color: var(--border2); }
.card-gold { border-color: rgba(201,168,76,0.3); background: linear-gradient(135deg, var(--card) 0%, rgba(201,168,76,0.05) 100%); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

/* METRIC CARDS */
.metric { padding: 20px 22px; }
.metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
.metric-value { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; letter-spacing: -.01em; }
.metric-sub { font-size: 11px; color: var(--muted2); margin-top: 6px; font-family: 'DM Mono', monospace; }
.metric-change { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 4px; }

/* HEADINGS */
.page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--cream); margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--muted2); margin-bottom: 28px; }
.section-title { font-size: 12px; color: var(--muted2); text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace; margin-bottom: 14px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 500; transition: all .15s; letter-spacing: .01em; }
.btn-gold { background: var(--gold); color: #0A0805; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,168,76,0.3); }
.btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--cream); border-color: var(--border2); background: rgba(255,255,255,0.04); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(217,79,79,0.3); }
.btn-danger:hover { background: rgba(217,79,79,0.1); }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

/* INPUTS */
.input { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 13px; font-size: 13px; color: var(--cream); font-family: 'Syne', sans-serif; outline: none; transition: border-color .15s; }
.input:focus { border-color: var(--gold); }
.input::placeholder { color: var(--muted); }
.select { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 13px; font-size: 13px; color: var(--cream); font-family: 'Syne', sans-serif; outline: none; cursor: pointer; }
.select:focus { border-color: var(--gold); }

/* TABS */
.tabs { display: flex; gap: 4px; padding: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: fit-content; margin-bottom: 24px; }
.tab { padding: 7px 16px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 500; color: var(--muted2); background: none; border: none; transition: all .15s; }
.tab.active { background: var(--card); color: var(--cream); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.tab:hover:not(.active) { color: var(--cream); }

/* BADGES */
.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 400; }

/* TABLE */
.table-wrap { overflow: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 16px; font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace; text-align: left; background: var(--surface); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* PROGRESS BAR */
.progress-wrap { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* DONUT */
.donut-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.donut-center { position: absolute; text-align: center; }

/* UPLOAD ZONE */
.upload-zone { border: 2px dashed var(--border2); border-radius: 16px; padding: 60px 40px; text-align: center; cursor: pointer; transition: all .2s; position: relative; }
.upload-zone:hover, .upload-zone.drag { border-color: var(--gold); background: var(--gold-glow); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 40px; margin-bottom: 16px; display: block; }
.upload-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; color: var(--cream); }
.upload-sub { color: var(--muted2); font-size: 13px; line-height: 1.6; }
.format-pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
.format-pill { padding: 4px 12px; border: 1px solid var(--border2); border-radius: 20px; font-size: 11px; color: var(--muted2); font-family: 'DM Mono', monospace; }

/* OVERLAY / MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; }
.overlay.hidden { display: none; }
.modal { background: var(--card); border: 1px solid var(--border2); border-radius: 16px; padding: 32px; width: 480px; max-width: 90vw; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; }
.modal-sub { color: var(--muted2); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* CHAT */
.chat-panel { display: flex; flex-direction: column; height: calc(100vh - 72px); }
.chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; max-width: 85%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
.msg.ai .msg-bubble { background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 4px 12px 12px 12px; }
.msg.user .msg-bubble { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); color: var(--cream); border-radius: 12px 4px 12px 12px; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.msg.ai .msg-avatar { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold2); }
.msg.user .msg-avatar { background: var(--card2); border: 1px solid var(--border2); color: var(--muted2); }
.chat-input-wrap { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
.chat-input { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 24px; padding: 11px 18px; font-size: 13px; color: var(--cream); font-family: 'Syne', sans-serif; outline: none; resize: none; line-height: 1.4; }
.chat-input:focus { border-color: var(--gold); }
.chat-send { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #0A0805; font-size: 16px; transition: all .15s; flex-shrink: 0; margin-top: 2px; }
.chat-send:hover { background: var(--gold2); transform: scale(1.05); }
.typing-dots span { display: inline-block; width: 5px; height: 5px; background: var(--muted2); border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out; }
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.6)}40%{transform:scale(1)} }

/* SCORE RING */
.score-ring { position: relative; display: inline-flex; }
.score-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.fade-up { animation: fadeUp .4s ease both; }
.fade-up-1 { animation: fadeUp .4s .08s ease both; }
.fade-up-2 { animation: fadeUp .4s .16s ease both; }
.fade-up-3 { animation: fadeUp .4s .24s ease both; }
.fade-up-4 { animation: fadeUp .4s .32s ease both; }
.fade-in { animation: fadeIn .3s ease both; }
.pulse { animation: pulse 2s infinite; }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { padding: 12px 18px; border-radius: var(--radius-sm); font-size: 13px; max-width: 320px; animation: fadeUp .3s ease; pointer-events: auto; display: flex; align-items: center; gap: 10px; }
.toast.info { background: var(--card2); border: 1px solid var(--border2); color: var(--cream); }
.toast.success { background: rgba(76,175,124,0.15); border: 1px solid rgba(76,175,124,0.4); color: var(--green); }
.toast.error { background: rgba(217,79,79,0.12); border: 1px solid rgba(217,79,79,0.35); color: var(--red); }

/* STAT BARS */
.stat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.stat-label { font-size: 12px; color: var(--muted2); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.stat-bar { height: 100%; border-radius: 2px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.stat-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2); width: 70px; text-align: right; flex-shrink: 0; }

/* INSIGHT CARD */
.insight-item { padding: 16px 18px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; }
.insight-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.insight-title { font-size: 13px; font-weight: 600; color: var(--cream); margin-bottom: 4px; }
.insight-text { font-size: 12px; color: var(--muted2); line-height: 1.55; }

/* LOADING */
.loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

/* CHIP FILTERS */
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); color: var(--muted2); background: transparent; font-family: 'DM Mono', monospace; transition: all .15s; }
.chip:hover { border-color: var(--border2); color: var(--cream); }
.chip.active { background: var(--gold-dim); border-color: rgba(201,168,76,0.4); color: var(--gold2); }

/* UPLOAD PAGE */
.upload-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
.upload-container { max-width: 680px; width: 100%; }
.hero-tag { display: inline-block; padding: 5px 14px; border: 1px solid rgba(201,168,76,0.4); border-radius: 20px; font-size: 11px; color: var(--gold); font-family: 'DM Mono', monospace; letter-spacing: .08em; margin-bottom: 20px; text-transform: uppercase; }
.hero-title { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; line-height: 1.15; color: var(--cream); margin-bottom: 12px; }
.hero-title em { color: var(--gold2); font-style: italic; }
.hero-sub { color: var(--muted2); font-size: 15px; line-height: 1.7; margin-bottom: 36px; max-width: 520px; }
.demo-btn-wrap { text-align: center; margin-top: 20px; }

/* DOT DECORATION */
.dot-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .4; background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 32px 32px; }
.glow-orb { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 0; top: -200px; right: -200px; }

/* HEALTH METER */
.health-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; gap: 2px; margin: 12px 0; }
.health-seg { flex: 1; background: rgba(255,255,255,0.08); border-radius: 1px; transition: background .4s; }

/* ===================== RESPONSIVE ===================== */

/* Score + metrics layout helper */
.dash-top { display: grid; grid-template-columns: auto 1fr; gap: 16px; margin-bottom: 16px; align-items: start; }
.dash-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
.dash-header-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* BOTTOM NAV (mobile only) */
.bottom-nav { display: none; }

/* ── TABLET (≤ 900px) ── */
@media (max-width: 900px) {
  .sidebar { width: 64px; }
  .logo-text, .logo-sub, .nav-item span:not(.icon), .nav-section { display: none; }
  .logo { padding: 0 12px 24px; justify-content: center; }
  .nav-item { padding: 14px; justify-content: center; }
  .content { padding: 24px 20px; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .hero-title { font-size: 34px; }
  .nav-footer { padding: 0 8px; }
  .api-status span { display: none; }
  #pwa-install-btn span:last-child { display: none; }
}

/* ── MOBILE (≤ 600px) ── */
@media (max-width: 600px) {
  /* Shell */
  .sidebar { display: none !important; }
  .app-shell { flex-direction: column; }
  .main { padding-bottom: 72px; overflow-x: hidden; }

  /* Bottom navigation */
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 62px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bottom-nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    font-size: 10px; color: var(--muted2); cursor: pointer;
    border: none; background: none;
    font-family: 'Syne', sans-serif; padding: 8px 4px 4px;
    transition: color .15s; position: relative;
  }
  .bottom-nav-item.active { color: var(--gold2); }
  .bottom-nav-item .bn-icon { font-size: 20px; line-height: 1; }
  .bottom-nav-item.active::before {
    content: ''; position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 2px; background: var(--gold);
    border-radius: 0 0 2px 2px;
  }

  /* Content */
  .content { padding: 14px 12px; }

  /* Grids */
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }

  /* Dashboard top: empilha score + metrics */
  .dash-top { grid-template-columns: 1fr; }

<script>
// ============ UTILS ============
const $ = id => document.getElementById(id);
const fmt = (v, cur='BRL') => new Intl.NumberFormat('pt-BR',{style:'currency',currency:cur,minimumFractionDigits:2}).format(v||0);
const fmtPct = v => (v||0).toFixed(1)+'%';
const fmtK = v => Math.abs(v)>=1000 ? (v/1000).toFixed(1)+'k' : (v||0).toFixed(0);

function toast(msg, type='info', dur=3500) {
  const icons = {info:'ℹ️', success:'✅', error:'⚠️'};
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  $('toasts').appendChild(el);
  setTimeout(() => el.remove(), dur);
}



// ============ LOCAL MODE (sem API) ============
const hasKey = () => false;
const openKeyModal = () => {};
const closeKeyModal = () => {};
const removeKey = () => {};
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ============ CACHE ============
const cache = {
  get(k) { try { const d=JSON.parse(localStorage.getItem('ff_'+k)); if(d&&Date.now()<d.exp) return d.v; } catch{} return null; },
  set(k,v,ttl=86400000) { try { localStorage.setItem('ff_'+k,JSON.stringify({v,exp:Date.now()+ttl})); } catch{} }
};

// ============ FILE PARSERS ============
// Detecta o separador dominante em um CSV (vírgula ou ponto-e-vírgula)
function detectSeparator(text) {
  const sample = text.slice(0, 2000);
  const commas = (sample.match(/,/g) || []).length;
  const semis  = (sample.match(/;/g) || []).length;
  return semis > commas ? ';' : ',';
}

// Parser CSV robusto: suporta , e ; como separador, aspas duplas, campos com quebra de linha
function parseCSVLine(line, sep) {
  const r = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; } // aspas escapadas ""
      else inQ = !inQ;
    } else if (c === sep && !inQ) {
      r.push(cur.trim()); cur = '';
    } else {
      cur += c;
    }
  }
  r.push(cur.trim());
  return r;
}

async function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  if (!lines.length) throw new Error('Arquivo CSV vazio');
  const sep = detectSeparator(text);
  // Encontra a primeira linha que parece um cabeçalho ou dado real (pula linhas de lixo)
  const parsed = lines.map(l => parseCSVLine(l, sep));
  // Remove linhas vazias ou com menos de 2 campos preenchidos
  return parsed.filter(row => row.filter(c => c !== '').length >= 2);
}

async function parseXLSX(buffer) {
  const wb = XLSX.read(buffer, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  // Remove linhas completamente vazias
  return rows.filter(row => row.some(c => String(c).trim() !== ''));
}

async function parsePDF(buffer) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await pdfjsLib.getDocument({data: buffer}).promise;

  // Reconstruct lines by grouping text items with similar Y-coordinate
  const allLines = [];
  for (let i = 1; i <= Math.min(pdf.numPages, 30); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    const lineMap = {};
    for (const item of content.items) {
      if (!item.str.trim()) continue;
      const y = Math.round(item.transform[5] / 2) * 2; // group within 2pt
      if (!lineMap[y]) lineMap[y] = [];
      lineMap[y].push({ x: item.transform[4], text: item.str });
    }

    const sortedYs = Object.keys(lineMap).map(Number).sort((a, b) => b - a);
    for (const y of sortedYs) {
      const lineText = lineMap[y].sort((a, b) => a.x - b.x).map(i => i.text).join(' ').trim();
      if (lineText) allLines.push(lineText);
    }
  }

  const fullText = allLines.join('\n');

  // Detect Banco Inter / any PT-BR date format ("X de Mês de AAAA")
  const hasInterDates = allLines.some(l => /^\d{1,2}\s+de\s+[^\s]+\s+de\s+\d{4}/i.test(l));
  if (fullText.includes('Banco Inter') || hasInterDates) {
    return parseInterBankLines(allLines);
  }

  return extractRowsFromText(fullText);
}

// Parser dedicado para extratos Banco Inter PDF
function parseInterBankLines(lines) {
  const months = {
    'janeiro':1,'fevereiro':2,'marco':3,'marco':3,'abril':4,'maio':5,'junho':6,
    'julho':7,'agosto':8,'setembro':9,'outubro':10,'novembro':11,'dezembro':12
  };

  // Linhas de crédito técnico que não representam receita real
  const SKIP_PATTERNS = [
    /^credito liberado/i, /^crédito liberado/i,
    /^saldo/i, /^valor\s+saldo/i,
    /^SAC:/i, /^Fale com/i, /^Ouvidoria/i,
    /^Deficiência/i, /^CPF\/CNPJ/i,
    /^Período/i, /^Solicitado em/i,
    /^Instituição/i, /^HENRIQUE/i,
    /^\d+\s+de\s+\d+$/i, // page numbers
  ];

  const txns = [['Data','Descricao','Valor']];
  let currentDate = '';

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    // Date header: "1 de Março de 2026 Saldo do dia: R$ 530,00"
    const dateMatch = line.match(/^(\d{1,2})\s+de\s+([^\s]+)\s+de\s+(\d{4})/i);
    if (dateMatch) {
      const day = dateMatch[1].padStart(2, '0');
      const monthRaw = dateMatch[2].toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const year = dateMatch[3];
      const month = months[monthRaw];
      if (month) currentDate = `${year}-${String(month).padStart(2,'0')}-${day}`;
      continue;
    }

    if (!currentDate) continue;
    if (SKIP_PATTERNS.some(p => p.test(line))) continue;

    // Find all monetary values on the line (e.g. -R$ 362,48  or  R$ 530,00)
    const amtMatches = [...line.matchAll(/(-\s*R\$\s*[\d.]+,\d{2}|R\$\s*[\d.]+,\d{2})/g)];
    if (!amtMatches.length) continue;

    // First value = transaction amount; last value = running balance (ignore)
    const firstAmtRaw = amtMatches[0][1].replace(/\s/g, '');
    const isExpense = firstAmtRaw.startsWith('-');
    const numStr = firstAmtRaw.replace(/[^\d,]/g, '').replace(',', '.');
    const value = parseFloat(numStr);
    if (isNaN(value) || value === 0) continue;

    // Description: text before first occurrence of -R$ or R$
    const dollarIdx = line.search(/(-\s*R\$|R\$)/);
    let desc = (dollarIdx > 0 ? line.slice(0, dollarIdx) : line).trim();
    // Clean up: remove surrounding quotes, colons, "Cp :XXXXX-" prefixes
    desc = desc.replace(/["]/g, '').replace(/:\s*$/, '').trim();
    desc = desc.replace(/Cp\s*:\d+-/gi, '').trim();
    if (desc.length < 2) continue;

    txns.push([currentDate, desc, isExpense ? -value : value]);
  }

  if (txns.length < 2) throw new Error('Nenhuma transação encontrada no PDF. Verifique se é um extrato do Banco Inter ou tente exportar como CSV.');
  return txns;
}

async function parseDOCX(buffer) {
  const arr = new Uint8Array(buffer);
  const decoder = new TextDecoder('utf-8');
  const raw = decoder.decode(arr);
  const matches = [...raw.matchAll(/<w:t[^>]*>([^<]*)<\/w:t>/g)];
  const text = matches.map(m => m[1]).join(' ');
  return extractRowsFromText(text);
}

async function parseOFX(text) {
  const txns = [['Data','Descricao','Valor']]; // cabeçalho fictício
  const blocks = text.match(/<STMTTRN>([\s\S]*?)<\/STMTTRN>/gi) || [];
  for (const b of blocks) {
    const get = tag => { const m = b.match(new RegExp(`<${tag}>([^<\n\r]*)`,'i')); return m?m[1].trim():''; };
    const amt = parseFloat(get('TRNAMT').replace(',','.'));
    if (!isNaN(amt)) {
      const dt = get('DTPOSTED').slice(0,8);
      txns.push([dt, get('MEMO')||get('NAME')||'', amt.toString()]);
    }
  }
  if (txns.length < 2) throw new Error('Nenhuma transação encontrada no arquivo OFX.');
  return txns;
}

function extractRowsFromText(text) {
  const lines = text.split(/[\n\r]+/).map(l=>l.trim()).filter(l=>l.length>3);
  const dateRe = /(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}|\d{4}-\d{2}-\d{2})/;
  const valRe  = /([-+]?\s*\d{1,3}(?:[.,]\d{3})*[.,]\d{2})/g;
  const rows = [];
  for (const line of lines) {
    const date = line.match(dateRe)?.[1];
    const vals = [...line.matchAll(valRe)].map(m => m[1].replace(/\s/g,''));
    if (date && vals.length) {
      const desc = line.replace(dateRe,'').replace(valRe,'').trim().substring(0,80);
      rows.push([date, desc, vals[0]]);
    }
  }
  if (!rows.length) throw new Error('Não foi possível extrair transações do arquivo. Tente CSV ou XLSX.');
  return [['Data','Descricao','Valor'], ...rows]; // injeta cabeçalho para guessColumns funcionar
}

async function parseFile(file) {
  const name = file.name.toLowerCase();
  const buf = await file.arrayBuffer();
  let rows;
  if (name.endsWith('.csv') || name.endsWith('.txt')) {
    rows = await parseCSV(await file.text());
  } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    rows = await parseXLSX(new Uint8Array(buf));
  } else if (name.endsWith('.pdf')) {
    rows = await parsePDF(buf);
  } else if (name.endsWith('.docx')) {
    rows = await parseDOCX(buf);
  } else if (name.endsWith('.ofx') || name.endsWith('.qif') || name.endsWith('.ofc')) {
    rows = await parseOFX(await file.text());
  } else {
    rows = await parseCSV(await file.text());
  }
  return rows;
}

// ============ DATA NORMALIZATION ============

// Varre as linhas até encontrar a que parece um cabeçalho real (tem palavras-chave)
function findHeaderRow(rows) {
  const patterns = ['data','date','dt','dia','valor','value','amount','descri','histor','memo','lançamento','debito','credito','saldo'];
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const row = rows[i].map(c => String(c).toLowerCase());
    const matches = row.filter(c => patterns.some(p => c.includes(p)));
    if (matches.length >= 2) return i;
  }
  return 0; // fallback: assume que linha 0 é cabeçalho
}

function guessColumns(rows) {
  if (!rows || rows.length < 2) throw new Error('Arquivo insuficiente');

  const headerIdx = findHeaderRow(rows);
  const header = rows[headerIdx].map(c => String(c).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  const skip = headerIdx + 1;

  const guess = (patterns) => {
    for (const p of patterns) {
      const i = header.findIndex(h => h.includes(p));
      if (i >= 0) return i;
    }
    return -1;
  };

  let dateCol = guess(['data','date','dt','dia']);
  let descCol = guess(['descri','histor','memo','detail','narrat','nome','lancamento','movimento']);
  let valCol  = guess(['valor','value','amount','quantia','debito','credito','saldo','total','transacao']);

  // Se não encontrou pelo cabeçalho, tenta detectar pelas primeiras linhas de dados
  if (dateCol < 0 || valCol < 0) {
    for (let i = skip; i < Math.min(rows.length, 5); i++) {
      const row = rows[i];
      if (!row || row.length < 2) continue;
      // Detecta coluna de data: célula que parece data
      const dateRe = /^\d{1,2}[\/\-\.]\d{1,2}[\/\-\.](\d{2,4})?$|^\d{4}-\d{2}-\d{2}$|^\d{8}$/;
      if (dateCol < 0) dateCol = row.findIndex(c => dateRe.test(String(c).trim()));
      // Detecta coluna de valor: célula numérica
      if (valCol < 0)  valCol  = row.findIndex((c,idx) => idx !== dateCol && parseValue(c) !== null);
    }
  }

  // Último recurso: atribui posições padrão
  if (dateCol < 0) dateCol = 0;
  if (valCol  < 0) valCol  = rows[skip]?.length > 2 ? 2 : 1;
  if (descCol < 0) descCol = [0,1,2].find(i => i !== dateCol && i !== valCol) ?? 1;

  return { date: dateCol, desc: descCol, value: valCol, skip };
}

function parseValue(raw) {
  if (raw === null || raw === undefined || raw === '') return null;
  const s = String(raw).trim().replace(/[^\d.,\-\+]/g, '');
  if (!s || s === '-' || s === '+') return null;
  let n;
  // Formato brasileiro: 1.234,56
  if (s.includes(',') && s.includes('.')) {
    if (s.lastIndexOf(',') > s.lastIndexOf('.')) {
      n = parseFloat(s.replace(/\./g,'').replace(',','.'));
    } else {
      n = parseFloat(s.replace(/,/g,''));
    }
  } else if (s.includes(',')) {
    // Pode ser separador decimal (1234,56) ou milhar (1,234) — detecta pelo número de dígitos após vírgula
    const afterComma = s.split(',').pop() || '';
    n = afterComma.length === 3 ? parseFloat(s.replace(',','')) : parseFloat(s.replace(',','.'));
  } else {
    n = parseFloat(s);
  }
  return isNaN(n) ? null : n;
}

function normalizeDate(raw) {
  if (!raw) return null;
  // Número serial do Excel (dias desde 1900)
  const num = Number(raw);
  if (!isNaN(num) && num > 1000 && num < 100000) {
    const d = new Date((num - 25569) * 86400 * 1000);
    if (!isNaN(d.getTime())) return d.toISOString().slice(0,10);
  }
  const s = String(raw).trim();
  if (/^\d{8}$/.test(s)) return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  // DD/MM/AAAA ou DD-MM-AAAA ou DD.MM.AAAA
  const m = s.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  if (m) {
    const y = m[3].length === 2 ? '20'+m[3] : m[3];
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  return null;
}

function rowsToTransactions(rows, cols) {
  const txns = [];
  for (let i = (cols.skip || 1); i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.filter(c => String(c).trim() !== '').length < 2) continue;
    const raw = parseValue(r[cols.value]);
    if (raw === null || Math.abs(raw) > 1e8) continue;
    if (raw === 0) continue; // linha de saldo zerado, sem interesse
    const v = Math.abs(raw);
    const desc = String(r[cols.desc] ?? r.find((c,idx) => idx !== cols.date && idx !== cols.value && String(c).trim()) ?? 'Sem descrição').trim().substring(0, 80);
    txns.push({
      id: i,
      date: normalizeDate(r[cols.date]) || '',
      description: desc || 'Sem descrição',
      value: v,
      isExpense: raw < 0 || (raw > 0 && guessExpense(desc)),
      category: 'Outros',
      raw: r
    });
  }
  return txns;
}

function guessExpense(desc) {
  const lower = desc.toLowerCase();
  const incomeWords = [
    'salário','salario','pagamento recebido','transferência recebida',
    'renda','rendimento','entrada','pix recebido','depósito','deposito',
    'crédito','credito','reembolso','devolução','devolucao',
    'pix enviado devolvido','estorno','cashback','rendimento','dividendo'
  ];
  return !incomeWords.some(w => lower.includes(w));
}

// ============ AI CATEGORIZATION ============
const CATEGORIES = ['Moradia','Alimentação','Transporte','Saúde','Lazer','Vestuário','Educação','Serviços','Assinaturas','Investimentos','Outros'];
const CAT_COLORS = {
  'Moradia': '#4A7EC9','Alimentação': '#4CAF7C','Transporte': '#8B5CF6','Saúde': '#E05555',
  'Lazer': '#C9A84C','Vestuário': '#22B8C9','Educação': '#E07B55','Serviços': '#6B9EC9',
  'Assinaturas': '#9B59B6','Investimentos': '#2ECC71','Outros': '#5A6478'
};

function getAllCategories() {
  return [...CATEGORIES, ...(state.settings.customCategories || [])];
}

function getCategoryColor(cat) {
  if (CAT_COLORS[cat]) return CAT_COLORS[cat];
  let hash = 0;
  for (let i = 0; i < cat.length; i++) hash = cat.charCodeAt(i) + ((hash << 5) - hash);
  const color = Math.floor(Math.abs(hash) * 16777215 % 16777215).toString(16);
  return '#' + '000000'.substring(0, 6 - color.length) + color;
}

function addCategory() {
  const inp = document.getElementById('new-cat-in');
  if (!inp) return;
  const v = inp.value.trim();
  if (v) {
    if (!state.settings.customCategories) state.settings.customCategories = [];
    if (!CATEGORIES.includes(v) && !state.settings.customCategories.includes(v)) {
      state.settings.customCategories.push(v);
      inp.value = '';
      render();
      toast('Categoria adicionada!', 'success');
    } else {
      toast('Categoria já existe', 'info');
    }
  }
}

function removeCategory(c) {
  if (state.settings.customCategories) {
    state.settings.customCategories = state.settings.customCategories.filter(x => x !== c);
    render();
  }
}

// ============ CATEGORIZAÇÃO LOCAL POR PALAVRAS-CHAVE ============

function categorizeLocal(desc) {
  const d = desc.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for (const [cat, keywords] of Object.entries(CAT_RULES)) {
    if (keywords.some(k => d.includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,'')))) return cat;
  }
  return 'Outros';
}

function categorize(txns) {
  const result = {};
  for (const t of txns) result[t.id] = categorizeLocal(t.description);
  return result;
}

// ============ INSIGHTS LOCAIS ============
async function getInsights(summary, settings) {
  return fallbackInsights(summary, settings);
}

function fallbackInsights(summary, settings) {
  const goal = (settings && settings.savingsGoal) || 20;
  const pct = summary.income > 0 ? (summary.balance / summary.income * 100) : 0;
  const score = Math.min(100, Math.max(0, Math.round(50 + pct * 0.8)));
  const topEntries = Object.entries(summary.byCategory || {}).sort((a,b)=>b[1]-a[1]);
  const topCat = topEntries[0]?.[0] || 'Outros';
  const topVal = topEntries[0]?.[1] || 0;
  const topPct = summary.expenses > 0 ? (topVal / summary.expenses * 100).toFixed(0) : 0;

  // Dicas dinâmicas baseadas nos dados reais
  const tips = [];
  if (pct < goal) tips.push(`Sua poupança atual é ${pct.toFixed(1)}% da renda. Meta: ${goal}%. Reduza despesas em ${fmt(summary.expenses - (summary.income * (1 - goal/100)))} para atingir o objetivo.`);
  else tips.push(`Parabéns! Você está poupando ${pct.toFixed(1)}% da renda — acima da meta de ${goal}%. Continue assim!`);

  if (topCat && topPct > 30) tips.push(`"${topCat}" é sua maior categoria: ${fmt(topVal)} (${topPct}% das despesas). Avaliar cortes aqui terá grande impacto.`);
  else if (topCat) tips.push(`Seus gastos estão bem distribuídos. "${topCat}" lidera com ${fmt(topVal)} (${topPct}% das despesas).`);

  if (summary.expenses > summary.income * 0.8) tips.push('Atenção: suas despesas consomem mais de 80% da renda. Revise assinaturas e gastos recorrentes.');
  else tips.push('Seus gastos estão em boa proporção em relação à renda. Mantenha o controle mensal.');

  const numCats = topEntries.length;
  if (numCats >= 3) {
    const second = topEntries[1];
    tips.push(`Segunda maior categoria: "${second[0]}" com ${fmt(second[1])}. Comparar com meses anteriores ajuda a identificar tendências.`);
  } else {
    tips.push('Acompanhe seus gastos semanalmente para manter o orçamento sob controle.');
  }

  const alerts = [];
  if (summary.balance < 0) alerts.push('⚠️ Seus gastos superaram sua renda neste período. Ação imediata recomendada.');
  if (topPct > 50) alerts.push(`"${topCat}" representa mais da metade de todos os gastos (${topPct}%). Considere revisar.`);

  const forecastBalance = summary.income > 0
    ? (summary.balance >= 0 ? `Projeção: saldo positivo de ${fmt(summary.balance)} se padrão atual se mantiver.` : `Atenção: déficit de ${fmt(Math.abs(summary.balance))} projetado para o próximo mês.`)
    : 'Adicione receitas para uma projeção mais precisa.';

  return {
    score,
    headline: score >= 75 ? 'Excelente controle financeiro!' : score >= 55 ? 'No caminho certo 👍' : score >= 35 ? 'Há espaço para melhorar' : 'Atenção: revise seus gastos',
    savingsTarget: summary.income * (goal / 100),
    savingsPct: Math.max(0, pct),
    tips,
    alerts,
    topCategory: topCat,
    forecast: forecastBalance,
  };
}

  }

    const incomes = txns.filter(t=>!t.isExpense).sort((a,b)=>b.value-a.value).slice(0,5);

  if (msg.includes('maior despesa') || msg.includes('maior gasto') || msg.includes('mais caro') || msg.includes('top') || msg.includes('top 5') || msg.includes('top5')) {

  if (msg.includes('dica') || msg.includes('conselho') || msg.includes('sugest') || msg.includes('ajuda') || msg.includes('oi') || msg.includes('olá') || msg.includes('ola') || msg.includes('boa')) {

function exportCSV(txns) {
  const header = 'Data,Descrição,Categoria,Tipo,Valor\n';
  const rows = txns.map(t => `"${t.date}","${t.description}","${t.category}","${t.isExpense?'Despesa':'Receita'}","${t.value.toFixed(2)}"`).join('\n');
  const blob = new Blob([header+rows], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fluxfinance_extrato.csv';
  a.click();
  toast('CSV exportado com sucesso!', 'success');
}

// ============ PWA: SERVICE WORKER ============
(function setupPWA() {
  // Service Worker para cache offline
  // NOTA: Service Workers só funcionam em HTTPS ou localhost.
  // Para usar como app instalável, sirva o arquivo via servidor local ou hospedagem.
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
    const swCode = `
const CACHE = 'fluxfinance-v2';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fresh = fetch(e.request).then(res => {
        if (res && res.status === 200) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached);
      return cached || fresh;
    })
  );
});`;
    try {
      const swBlob = new Blob([swCode], {type:'application/javascript'});
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl, {scope: './'}).catch(()=>{});
    } catch(e) {}
  }
})();

      settings: state.settings,

}

}

// ============ COMPUTED ============
function getStats() {
  const txns = state.transactions || [];
  const expenses = txns.filter(t=>t.isExpense);
  const income = txns.filter(t=>!t.isExpense);
  const totalExp = expenses.reduce((s,t)=>s+t.value,0);
  const totalInc = income.reduce((s,t)=>s+t.value,0);
  const balance = totalInc - totalExp;
  const byCategory = {};
  expenses.forEach(t => { byCategory[t.category] = (byCategory[t.category]||0) + t.value; });
  const dailyMap = {};
  txns.forEach(t => { if(!dailyMap[t.date]) dailyMap[t.date]={date:t.date,exp:0,inc:0}; if(t.isExpense)dailyMap[t.date].exp+=t.value; else dailyMap[t.date].inc+=t.value; });
  return { expenses, income, totalExp, totalInc, balance, byCategory, daily: Object.values(dailyMap).sort((a,b)=>a.date.localeCompare(b.date)) };
}

function scoreColor(s) {

function amtColor(v) { return v>=0?'var(--green)':'var(--red)'; }
function svgDonut(pct, color, size=100, stroke=10) {
  const r = (size-stroke*2)/2;
  const cx = size/2, cy = size/2;
  const circ = 2*Math.PI*r;
  const dash = (pct/100)*circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${stroke}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round" style="transition:stroke-dasharray .6s"/>
  </svg>`;
}

function render() {
  const views = {
    upload: renderUpload,
    dashboard: renderDashboard,
    transactions: renderTransactions,
    chat: renderChat,
    settings: renderSettings,
  };
  const viewFn = views[state.tab] || renderUpload;
  const view = !state.transactions && ['dashboard','transactions','chat'].includes(state.tab) ? renderUpload() : viewFn();

  $('root').innerHTML = `
  <div class="app-shell">
    ${state.transactions ? renderSidebar() : ''}
    <div class="main">${view}</div>
  </div>
  ${renderBottomNav()}`;

  // Show install btn if prompt available
  const installBtn = document.getElementById('pwa-install-btn');
  if (installBtn && _deferredInstall) installBtn.style.display = 'flex';

  // Re-attach drag events
  const dz = document.getElementById('drop-zone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
    dz.addEventListener('dragleave', e => { e.preventDefault(); dz.classList.remove('drag'); });
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); const f=e.dataTransfer.files[0]; if(f) processFile(f); });
  }

  // Chat scroll
  const cm = document.getElementById('chat-msgs');
  if (cm) cm.scrollTop = cm.scrollHeight;
}

// ============ ACTIONS ============
async function handleFileInput(e) {
  const f = e.target.files[0];
  if (f) processFile(f);
}

async function processFile(file) {
  setState({_uploadError: null, _uploading: true});
  try {
    const rawRows = await parseFile(file);
    if (!rawRows || rawRows.length < 2) throw new Error('Arquivo sem dados suficientes');
    const cols = guessColumns(rawRows);
    const txns = rowsToTransactions(rawRows, cols);
    if (!txns.length) throw new Error('Nenhuma transação válida encontrada');
    toast(`${txns.length} transações carregadas!`, 'success');
    state.transactions = txns;
    state.tab = 'dashboard';
    render();
    // Categorização local automática
    setState({categorizing: true});
    const map = categorize(txns.filter(t=>t.category==='Outros'));
    for (const [id,cat] of Object.entries(map)) {
      const t = txns.find(t=>String(t.id)===String(id));
      if (t) t.category = cat;
    }
    toast('Categorização concluída!', 'success');
    setState({categorizing: false, insights: fallbackInsights({income: getStats().totalInc, expenses: getStats().totalExp, balance: getStats().balance, byCategory: getStats().byCategory}, state.settings)});
    saveData();
  } catch(e) {
    const hint = e.message.includes('insuficiente') || e.message.includes('suficientes')
      ? 'Verifique se o arquivo tem pelo menos uma linha de cabeçalho e dados. Formatos suportados: CSV (vírgula ou ponto-e-vírgula), XLSX, OFX.'
      : e.message.includes('transação') || e.message.includes('válida')
      ? 'Nenhuma transação reconhecida. Certifique-se de que o arquivo tem colunas de Data, Descrição e Valor.'
      : e.message;
    setState({_uploadError: hint, _uploading: false});
    toast('Erro ao carregar arquivo', 'error');
  }
}

async function refreshInsights() {
  setState({insightsLoading: true});
  const s = getStats();
  const ins = fallbackInsights({income: s.totalInc, expenses: s.totalExp, balance: s.balance, byCategory: s.byCategory}, state.settings);
  setState({insights: ins, insightsLoading: false});
  toast('Insights atualizados!', 'success');
}

async function recategorize() {
  if (!state.transactions) return;
  setState({categorizing: true});
  const map = categorize(state.transactions);
  for (const [id,cat] of Object.entries(map)) {
    const t = state.transactions.find(t=>String(t.id)===String(id));
    if (t) t.category = cat;
  }
  toast('Recategorização concluída!', 'success');
  setState({categorizing: false});
  saveData();
}

function updateCat(id, cat) {
  const t = state.transactions?.find(t=>t.id===id);
  if (t) { t.category = cat; saveData(); render(); }
}

function clearData() {
  if (!confirm('Limpar todos os dados? Esta ação não pode ser desfeita.')) return;
  state.transactions = null;
  state.insights = null;
  state.tab = 'upload';
  chatHistory = [];
  state.chatMessages = [{role:'ai', text:'Olá! Sou o FluxFinance. Carregue seu extrato ou tire dúvidas financeiras! 💰'}];
  clearStorage();
  render();
  toast('Dados apagados com sucesso.', 'info');
}

function loadDemo() {
  const cats = ['Alimentação','Transporte','Moradia','Lazer','Saúde','Serviços','Assinaturas','Outros'];
  const descs = {
    'Alimentação':['iFood Pedido','Supermercado Pão de Açúcar','McDonald\'s','Restaurante Sushi','Mercado Local','Rappi Delivery','Cafe Fran','Açougue Central'],
    'Transporte':['Uber Trip','Gasolina Shell','99 Corrida','Estacionamento Shopping','Metrô Recarga','Ônibus','Táxi'],
    'Moradia':['Aluguel Apartamento','Condomínio','CEMIG Energia','SAAE Água','Internet Vivo Fibra'],
    'Lazer':['Netflix Premium','Spotify','Cinema AMC','Show de Música','Academia Smart Fit','Steam Jogo'],
    'Saúde':['Farmácia Drogasil','Consulta Médica','Plano de Saúde Amil','Exame Laboratório'],
    'Serviços':['Google One','Adobe Creative','Freelancer Pagamento','Serviço Técnico'],
    'Assinaturas':['Prime Video','HBO Max','Microsoft 365','Alura Cursos'],
    'Outros':['Transferência PIX','Saque ATM','Compra Online']
  };
  const txns = [];
  let id = 1;
  // Salary
  for (let m=0; m<2; m++) {
    txns.push({id:id++, date:`2024-${String(m+1).padStart(2,'0')}-05`, description:'Salário Empresa XYZ', value:5800, isExpense:false, category:'Outros'});
    txns.push({id:id++, date:`2024-${String(m+1).padStart(2,'0')}-10`, description:'Freelance Web Design', value:1200, isExpense:false, category:'Outros'});
  }
  // Expenses
  for (let d=1; d<=45; d++) {
    const cat = cats[Math.floor(Math.random()*cats.length)];
    const catDescs = descs[cat];
    const desc = catDescs[Math.floor(Math.random()*catDescs.length)];
    const base = {Alimentação:35,Transporte:25,Moradia:1200,Lazer:80,Saúde:120,Serviços:50,Assinaturas:40,Outros:100};
    const v = (base[cat]||50) * (0.6 + Math.random()*0.8);
    const mo = Math.floor(d/30)+1;
    const day = (d%28)+1;
    txns.push({id:id++, date:`2024-0${mo}-${String(day).padStart(2,'0')}`, description:desc, value:parseFloat(v.toFixed(2)), isExpense:true, category:cat});
  }
  state.transactions = txns;
  state.tab = 'dashboard';
  state.insights = fallbackInsights((() => {
    const ex=txns.filter(t=>t.isExpense).reduce((s,t)=>s+t.value,0);
    const inc=txns.filter(t=>!t.isExpense).reduce((s,t)=>s+t.value,0);
    const bc={};
    txns.filter(t=>t.isExpense).forEach(t=>{bc[t.category]=(bc[t.category]||0)+t.value;});
    return {income:inc, expenses:ex, balance:inc-ex, byCategory:bc};
  })(), state.settings);
  render();
  toast('Dados de demonstração carregados!', 'success');
}

// ============ CHAT ACTIONS ============
async function sendChat() {
  const input = document.getElementById('chat-in');
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  state.chatMessages.push({role:'user', text: msg});
  state.chatTyping = true;
  render();
  const stats = getStats();
  const topTxns = (state.transactions || [])
    .filter(t => t.isExpense)
    .sort((a, b) => b.value - a.value)
    .slice(0, 20)
    .map(t => `${t.date} | ${t.description} | ${t.category} | R$ ${t.value.toFixed(2)}`);
  try {
    const reply = await chatWithAI(msg, {
      income: stats.totalInc,
      expenses: stats.totalExp,
      balance: stats.balance,
      byCategory: stats.byCategory,
      txCount: (state.transactions || []).length,
      topTransactions: topTxns
    });
    state.chatTyping = false;
    state.chatMessages.push({role:'ai', text: reply});
    saveData();
    render();
  } catch(e) {
    state.chatTyping = false;
    state.chatMessages.push({role:'ai', text:'Desculpe, ocorreu um erro ao processar sua mensagem.'});
    render();
  }
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function quickChat(q) {
  const inp = document.getElementById('chat-in');
  if (inp) { inp.value = q; sendChat(); }
}

// ============ PWA INSTALL PROMPT ============
let _deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstall = e;
  // Show install button in sidebar
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredInstall = null;
  toast('FluxFinance instalado com sucesso! 🎉', 'success', 4000);
});

function installPWA() {
  if (_deferredInstall) {
    _deferredInstall.prompt();
    _deferredInstall.userChoice.then(r => {
      if (r.outcome === 'accepted') toast('Instalando FluxFinance...', 'success');
      _deferredInstall = null;
    });
    return;
  }
  // Check if already installed
  if (window.matchMedia('(display-mode: standalone)').matches) {
    toast('✅ FluxFinance já está instalado!', 'success');
    return;
  }
  // File protocol — main issue
  if (location.protocol === 'file:') {
    toast('⚠️ Para instalar: sirva o arquivo via servidor HTTP. Veja Configurações → Instalar como App.', 'info', 6000);
    setState({tab:'settings'});
    return;
  }
  toast('Use o menu do navegador → "Instalar app" ou "Adicionar à tela inicial"', 'info', 5000);
}

// ============ INIT ============
render();
